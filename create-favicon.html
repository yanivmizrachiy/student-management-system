<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>יצירת Favicon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #1a1a1a;
            color: white;
        }
        canvas {
            border: 2px solid #333;
            margin: 20px 0;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <h1>יצירת Favicon לאתר</h1>
    <canvas id="faviconCanvas" width="32" height="32"></canvas>
    <br>
    <button onclick="createFavicon()">צור Favicon</button>
    <button onclick="downloadFavicon()">הורד Favicon</button>
    
    <script>
        function createFavicon() {
            const canvas = document.getElementById('faviconCanvas');
            const ctx = canvas.getContext('2d');
            
            // רקע כהה עם גרדיאנט
            const gradient = ctx.createLinearGradient(0, 0, 32, 32);
            gradient.addColorStop(0, '#0f0c29');
            gradient.addColorStop(0.5, '#302b63');
            gradient.addColorStop(1, '#24243e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            
            // ציור אות עברית (נ' או מ')
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('נ', 16, 16);
            
            // עדכן את ה-favicon בדף
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/png';
            link.rel = 'shortcut icon';
            link.href = canvas.toDataURL();
            document.getElementsByTagName('head')[0].appendChild(link);
            
            console.log('Favicon נוצר!');
        }
        
        function downloadFavicon() {
            const canvas = document.getElementById('faviconCanvas');
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'favicon.ico';
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        // צור אוטומטית בעת טעינה
        window.addEventListener('load', createFavicon);
    </script>
</body>
</html>
