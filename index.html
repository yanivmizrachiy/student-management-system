<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מערכת ניהול תלמידים</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <script src="data.js"></script>
  <script src="auto-load-data.js"></script>
  <script src="update-teachers.js"></script>
  <script src="update-class-teachers.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(120, 119, 198, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 50px 20px;
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 25px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .main-title {
      font-size: 3.8rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(255,255,255,0.5);
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 30px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .layers-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-bottom: 60px;
    }

    .layer-btn {
      border: none;
      border-radius: 20px;
      padding: 20px 32px;      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4),
                  0 6px 16px rgba(0,0,0,0.25),
                  inset 0 2px 0 rgba(255,255,255,0.15);
      min-width: 200px;      text-decoration: none;
      display: block;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    .layer-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .layer-btn:hover::before {
      left: 100%;
    }

    .layer-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5),
                  0 8px 20px rgba(0,0,0,0.3),
                  inset 0 2px 0 rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.3);
    }
    
    /* כפתור שכבה ז' - כחול פרימיום */
    #layer7Btn {
      background: linear-gradient(145deg, #2962ff 0%, #1e4ed8 50%, #0d47a1 100%) !important;
      border-color: rgba(41, 98, 255, 0.4) !important;
    }
    
    #layer7Btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    
    #layer7Btn:hover::after {
      opacity: 1;
    }
    
    /* כפתור שכבה ח' - ירוק פרימיום */
    #layer8Btn {
      background: linear-gradient(145deg, #00c853 0%, #00a043 50%, #007a32 100%) !important;
      border-color: rgba(0, 200, 83, 0.4) !important;
    }
    
    #layer8Btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.2) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    
    #layer8Btn:hover::after {
      opacity: 1;
    }
    
    /* כפתור שכבה ט' - כתום פרימיום */
    #layer9Btn {
      background: linear-gradient(145deg, #ff9800 0%, #e68900 50%, #cc7700 100%) !important;
      border-color: rgba(255, 152, 0, 0.4) !important;
    }
    
    #layer9Btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    
    #layer9Btn:hover::after {
      opacity: 1;
    }

    .layer-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 14px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.4),
                   0 1px 4px rgba(0,0,0,0.3),
                   0 0 20px rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
      position: relative;
      z-index: 2;
    }

    .layer-count {
      font-size: 3.2rem;
      font-weight: 900;
      color: #ffffff;
      margin: 12px 0;
      text-shadow: 0 4px 16px rgba(0,0,0,0.5),
                   0 2px 8px rgba(0,0,0,0.4),
                   0 0 30px rgba(255,255,255,0.6);
      position: relative;
      z-index: 2;
      line-height: 1.1;
    }

    .layer-label {
      font-size: 1.05rem;
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4),
                   0 1px 4px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
      margin-top: 8px;
    }

    .total-counter {
      background: linear-gradient(145deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      border-radius: 20px;
      padding: 32px 48px;
      display: inline-block;
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.4),
                  0 6px 20px rgba(118, 75, 162, 0.3),
                  inset 0 1px 0 rgba(255,255,255,0.15);
      animation: pulse 4s infinite;
      margin: 35px auto;
      text-align: center;
      border: 1.5px solid rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
    }

    .total-counter::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
    }

    .total-label {
      font-size: 1.4rem;
      color: white;
      margin-bottom: 12px;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      letter-spacing: 0.2px;
    }

    .total-count {
      font-size: 3.5rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 25px rgba(255,255,255,0.7),
                   0 3px 15px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    .total-sublabel {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.9);
      font-weight: 500;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .admin-controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }

    .admin-toggle {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 8px 18px;
      color: white;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
    }

    .admin-toggle:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .admin-toggle.active {
      background: linear-gradient(135deg, rgba(34,193,195,0.3) 0%, rgba(45,253,47,0.3) 100%);
      border-color: rgba(34,193,195,0.6);
      box-shadow: 0 4px 20px rgba(34,193,195,0.4);
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
        overflow-x: hidden;
      }

      .admin-controls {
        top: 8px;
        left: 8px;
        right: auto;
        position: fixed;
        z-index: 1000;
      }

      .admin-toggle {
        padding: 8px 14px;
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .header {
        padding: 20px 12px;
        margin-bottom: 20px;
        margin-top: 50px;
      }

      .main-title {
        font-size: 1.5rem;
        margin-bottom: 8px;
        line-height: 1.2;
        word-wrap: break-word;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 15px;
        line-height: 1.4;
      }
      
      .layers-container {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        margin-bottom: 25px;
      }
      
      .layer-btn {
        min-width: 100%;
        width: 100%;
        padding: 20px 24px;
        box-sizing: border-box;
      }

      .layer-title {
        font-size: 1.2rem;
      }

      .layer-count {
        font-size: 1.8rem;
      }

      .layer-label {
        font-size: 0.95rem;
      }

      .total-counter {
        padding: 20px 24px;
        width: 100%;
        box-sizing: border-box;
        margin: 20px 0;
      }

      .total-label {
        font-size: 1.1rem;
        margin-bottom: 12px;
      }

      .total-count {
        font-size: 2.5rem;
      }

      .total-sublabel {
        font-size: 0.9rem;
        margin-top: 8px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
        overflow-x: hidden;
      }

      .admin-controls {
        top: 10px;
        left: 10px;
        right: auto;
        position: fixed;
        z-index: 1000;
      }

      .admin-toggle {
        padding: 8px 16px;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .header {
        padding: 25px 15px;
        margin-bottom: 30px;
        margin-top: 50px;
      }

      .main-title {
        font-size: 1.8rem;
        margin-bottom: 10px;
        line-height: 1.2;
      }

      .subtitle {
        font-size: 0.95rem;
        margin-bottom: 20px;
        line-height: 1.4;
      }
      
      .layers-container {
        flex-direction: column;
        align-items: stretch;
        gap: 15px;
        margin-bottom: 30px;
      }
      
      .layer-btn {
        min-width: 100%;
        width: 100%;
        max-width: 100%;
        padding: 25px 30px;
        box-sizing: border-box;
      }

      .layer-title {
        font-size: 1.4rem;
      }

      .layer-count {
        font-size: 2.2rem;
      }

      .total-counter {
        padding: 25px 30px;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
      }

      .total-label {
        font-size: 1.3rem;
      }

      .total-count {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="admin-controls">
    <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()">
      <span id="adminStatus">🔓 מצב צפייה</span>
    </button>
  </div>

  <div class="container">
    <div class="header">
      <h1 class="main-title">מערכת חכמה לניהול תלמידים</h1>
      <p class="subtitle">האתר מנוהל ע"י יניב רז</p>
    </div>
    
    <div class="layers-container">
      <a href="layer.html?layer=7" class="layer-btn" id="layer7Btn">
        <div class="layer-title">שכבת ז'</div>
        <div class="layer-count" id="count7">0</div>
        <div class="layer-label">תלמידים</div>
      </a>
      
      <a href="layer.html?layer=8" class="layer-btn" id="layer8Btn">
        <div class="layer-title">שכבת ח'</div>
        <div class="layer-count" id="count8">0</div>
        <div class="layer-label">תלמידים</div>
      </a>
      
      <a href="layer.html?layer=9" class="layer-btn" id="layer9Btn">
        <div class="layer-title">שכבת ט'</div>
        <div class="layer-count" id="count9">0</div>
        <div class="layer-label">תלמידים</div>
      </a>
    </div>
    
    <div style="text-align: center;">
      <div class="total-counter">
        <div class="total-label">סה"כ תלמידי בית הספר</div>
        <div class="total-count" id="totalCount">0</div>
        <div class="total-sublabel">תלמידים</div>
      </div>
    </div>
  </div>

  <script>
    function toggleAdmin() {
      // אם כבר במצב עריכה, יציאה ממצב עריכה
      if (DataStore.isAdmin) {
        DataStore.isAdmin = false;
        updateAdminUI();
        return;
      }
      
      // אם לא במצב עריכה, בקשת סיסמה
      const password = prompt('הכנס סיסמה לכניסה למצב עריכה:');
      if (password === '1167') {
        DataStore.isAdmin = true;
        updateAdminUI();
        alert('✅ נכנסת למצב עריכה');
      } else if (password !== null) {
        alert('❌ סיסמה שגויה');
      }
    }

    function updateAdminUI() {
      const toggle = document.getElementById('adminToggle');
      const status = document.getElementById('adminStatus');
      if (DataStore.isAdmin) {
        toggle.classList.add('active');
        status.textContent = '🔒 מצב עריכה';
      } else {
        toggle.classList.remove('active');
        status.textContent = '🔓 מצב צפייה';
      }
    }

    function updateCounts() {
      DataStore.load(true);
      
      // ביטול cache לפני חישוב מונים
      if (DataStore._invalidateCache) {
        DataStore._invalidateCache();
      }
      
      const count7 = DataStore.getLayerCount('7', false);
      const count8 = DataStore.getLayerCount('8', false);
      const count9 = DataStore.getLayerCount('9', false);
      const total = DataStore.getTotalCount(false);
      
      const el7 = document.getElementById('count7');
      const el8 = document.getElementById('count8');
      const el9 = document.getElementById('count9');
      const elTotal = document.getElementById('totalCount');
      
      if (el7) el7.textContent = count7 || 0;
      if (el8) el8.textContent = count8 || 0;
      if (el9) el9.textContent = count9 || 0;
      if (elTotal) elTotal.textContent = total || 0;
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateAdminUI();
      
      let updateTimeout = null;
      let isUpdating = false;
      
      function refreshCounts() {
        // מניעת עדכונים כפולים
        if (isUpdating) {
          return;
        }
        
        isUpdating = true;
        
        // טעינת נתונים עם force
        DataStore.load(true);
        
        // ביטול cache
        if (DataStore._invalidateCache) {
          DataStore._invalidateCache();
        }
        
        // עדכון מיידי ללא קפיצות
        updateCounts();
        
        isUpdating = false;
      }
      
      // debounce - מניעת עדכונים מרובים
      function debouncedRefresh() {
        if (updateTimeout) {
          clearTimeout(updateTimeout);
        }
        updateTimeout = setTimeout(() => {
          refreshCounts();
        }, 300);
      }
      
      // עדכון ראשוני
      refreshCounts();
      
      // המתן שהנתונים יטענו (auto-load-data.js רץ)
      setTimeout(() => {
        refreshCounts();
      }, 2000);
      
      // עדכון כל 5 שניות (פחות תכוף - מניעת קפיצות)
      // שמירת interval ID למניעת memory leaks
      const refreshInterval = setInterval(() => {
        debouncedRefresh();
      }, 5000);
      
      // האזנה לאירוע dataLoaded מ-auto-load-data.js
      const dataLoadedHandler = () => {
        debouncedRefresh();
      };
      window.addEventListener('dataLoaded', dataLoadedHandler);
      
      // ניקוי לפני סגירת הדף - מניעת memory leaks
      window.addEventListener('beforeunload', () => {
        if (refreshInterval) {
          clearInterval(refreshInterval);
        }
        if (updateTimeout) {
          clearTimeout(updateTimeout);
        }
        window.removeEventListener('dataLoaded', dataLoadedHandler);
      });
    });
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
