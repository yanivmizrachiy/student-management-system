    function clearData() {
      if (confirm('האם אתה בטוח שברצונך למחוק את כל הנתונים?')) {
        DataStore.clearAll();
        document.getElementById('result').innerHTML = '<div class="success">כל הנתונים נמחקו</div>';
      }
    }

    function showResult(result, message, classesInfo = null) {
      const classesText = classesInfo || result.classItem.name;
      document.getElementById('result').innerHTML = `
        <div class="success">
          ✓ ${message}<br>
          ${result.added} תלמידים חדשים (מתוך ${result.total})<br>
          ${result.classesUsed && result.classesUsed.length > 1 ? 'כיתות: ' : 'כיתה: '}${classesText}<br>
          הקבצה: ${result.group.name}<br>
          מורה: ${result.teacher.name}
        </div>
        <br>
        <button onclick="window.location.href='index.html'">עבור לדף הבית</button>
      `;
    }

    window.onload = () => {
      DataStore.load();
      if (DataStore.students.length > 0) {
        document.getElementById('result').innerHTML = `
          <div class="info">
            יש כבר ${DataStore.students.length} תלמידים במערכת.<br>
            ניתן להוסיף קבוצות נוספות ללא מחיקת הנתונים הקיימים.
          </div>
        `;
      }
    };
