<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה למערכת ניהול התלמידים</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .card {
      max-width: 520px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.5);
    }
    h1 {
      margin-bottom: 12px;
      font-size: 2.6rem;
    }
    p {
      margin-bottom: 28px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.6;
    }
    a.primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    a.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.35);
    }
    .note {
      margin-top: 30px;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>מערכת ניהול תלמידים</h1>
    <p>כל העדכונים והנתונים נשמרים אוטומטית ב־GitHub וקוראים רק באמצעות הקישור הרשמי. לחץ למטה כדי להיכנס לאתר שלך.</p>
    <a class="primary" href="https://yanivmizrachiy.github.io/student-management-system/" target="_blank" rel="noreferrer">
      פתח את האתר שלי
    </a>
    <div class="note">
      הקישור תמיד מתעדכן מה־GitHub שלנו. כל שינוי לחץ על כפתור העדכון כדי להעלות גרסה חדשה.
    </div>
  </div>
</body>
</html>
