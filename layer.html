<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שכבה - מערכת ניהול תלמידים</title>
  <script src="data.js"></script>
  <script src="shared-utils.js"></script>
  <script src="auto-load-data.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(120, 119, 198, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 35px;
      margin-bottom: 40px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .title-section {
      flex: 1;
    }

    .title-section h1 {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 9px 20px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(0,0,0,0.25);
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .group-card {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid rgba(102, 126, 234, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: block;
      color: white;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.12),
                  inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      min-height: 90px;
    }

    .group-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
    }

    .group-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .group-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 8px;
      word-wrap: break-word;
    }
    
    .group-teacher {
      font-size: 0.85rem;
      font-weight: 600;
      color: #008080;
      text-align: center;
      margin-bottom: 8px;
    }

    .group-count-section {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }

    .group-count-badge {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.35) 0%, rgba(118, 75, 162, 0.35) 100%);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      color: #ffffff;
      display: inline-block;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.5);
      font-size: 1.2rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      .header {
        padding: 20px;
        margin-bottom: 20px;
      }


      .title-section h1 {
        font-size: 1.6rem;
      }


      .nav-buttons {
        width: 100%;
        flex-direction: column;
        gap: 10px;
      }

      .nav-btn {
        padding: 10px 15px;
        font-size: 0.85rem;
        width: 100%;
      }

      .groups-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .group-card {
        padding: 14px;
        min-height: 100px;
      }

      .group-title {
        font-size: 1.15rem;
        margin-bottom: 12px;
      }

      .group-count-badge {
        font-size: 0.75rem;
        padding: 4px 10px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .header {
        padding: 25px;
        margin-bottom: 25px;
      }


      .title-section h1 {
        font-size: 2rem;
      }


      .nav-buttons {
        width: 100%;
        justify-content: flex-start;
      }

      .nav-btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

      .groups-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .group-card {
        padding: 14px;
      }

      .group-title {
        font-size: 1.25rem;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header">
      <div class="header-content">
        <div class="title-section">
          <h1 id="layerTitle">שכבה</h1>
        </div>
        <div class="nav-buttons">
          <a href="index.html" class="nav-btn">← חזרה</a>
        </div>
      </div>
    </div>

    <div class="groups-grid" id="groupsGrid">
      <div class="empty-state">טוען...</div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      function getLayerFromURL() {
        return SharedUtils.getURLParameter('layer');
      }

      function renderPage() {
        const layer = getLayerFromURL();
        
        if (!layer) {
          window.location.href = 'index.html';
          return;
        }

        DataStore.load(true);
        DataStore._invalidateCache();

        if (!DataStore.students || !Array.isArray(DataStore.students)) {
          setTimeout(renderPage, 200);
          return;
        }

        const layerName = DataStore.getLayerName(layer);
        const totalCount = DataStore.getLayerCount(layer, false);
        const layerTitleEl = document.getElementById('layerTitle');
        if (layerTitleEl) {
          layerTitleEl.textContent = `שכבת ${layerName} - ${totalCount} לומדים`;
        }

        const headerEl = document.getElementById('header');
        if (headerEl) {
          headerEl.style.background = DataStore.getLayerColor(layer);
        }

        const groups = DataStore.getGroupsByLayer(layer);
        const grid = document.getElementById('groupsGrid');
        if (!grid) return;

        const groupsWithStudents = groups.filter(group => {
          return group && group.id && DataStore.getGroupCount(group.id, false) > 0;
        });

        if (groupsWithStudents.length === 0) {
          grid.innerHTML = '<div class="empty-state">אין הקבצות עם תלמידים בשכבה זו</div>';
          return;
        }

        grid.innerHTML = groupsWithStudents.map(group => {
          const teacher = DataStore.getTeacher(group.teacherId);
          const count = DataStore.getGroupCount(group.id, false);
          const groupName = SharedUtils.escapeHtml(group.name);
          const teacherName = teacher ? SharedUtils.escapeHtml(teacher.name) : '';
          const groupId = SharedUtils.escapeHtml(group.id);

          return `
            <a href="group.html?groupId=${groupId}" class="group-card">
              <div class="group-content">
                <div class="group-title">${groupName}</div>
                ${teacherName ? `<div class="group-teacher">${teacherName}</div>` : ''}
                <div class="group-count-section">
                  <div class="group-count-badge">${count} תלמידים</div>
                </div>
              </div>
            </a>
          `;
        }).join('');
      }

      function init() {
        if (typeof DataStore === 'undefined') {
          setTimeout(init, 100);
          return;
        }

        function loadAndRender() {
          DataStore.load(true);
          DataStore._invalidateCache();
          setTimeout(renderPage, 200);
        }
        
        loadAndRender();
        setInterval(loadAndRender, 2000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
