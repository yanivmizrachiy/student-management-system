<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שכבה - מערכת ניהול תלמידים</title>
  <script src="data.js"></script>
  <script src="shared-utils.js"></script>
  <script src="auto-load-data.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: white;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(120, 119, 198, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255,255,255,0.08);
      border-radius: 25px;
      padding: 35px;
      margin-bottom: 40px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .nav-breadcrumbs {
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }

    .nav-breadcrumbs a {
      color: #667eea;
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 500;
    }

    .nav-breadcrumbs a:hover {
      color: #ffffff;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .title-section {
      flex: 1;
    }

    .title-section h1 {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .layer-total-count {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-top: 10px;
    }

    .count-number {
      font-size: 2.8rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5),
                   0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .count-label {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 9px 20px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(0,0,0,0.25);
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .group-card {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(102, 126, 234, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: block;
      color: white;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.12),
                  inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
      min-height: 140px;
    }

    .group-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.12), transparent);
      transition: left 0.5s ease;
    }

    .group-card:hover::before {
      left: 100%;
    }

    .group-card:hover {
      border-color: rgba(102, 126, 234, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3),
                  0 2px 8px rgba(0,0,0,0.15),
                  inset 0 1px 0 rgba(255,255,255,0.08);
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
    }

    .group-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .group-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
      word-wrap: break-word;
    }

    .teacher-name-in-title {
      color: #ffffff;
      font-weight: 700;
      background: rgba(0, 128, 128, 0.85);
      padding: 3px 10px;
      border-radius: 8px;
      display: inline-block;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      box-shadow: 0 2px 6px rgba(0, 128, 128, 0.4);
      text-decoration: none;
      transition: all 0.3s ease;
      margin: 0 4px;
    }
    
    .teacher-name-in-title:hover {
      background: rgba(0, 128, 128, 1);
      transform: scale(1.05);
      box-shadow: 0 3px 8px rgba(0, 128, 128, 0.6);
    }

    .group-count-section {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.12);
      text-align: center;
    }

    .group-count-badge {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.25) 100%);
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      color: rgba(255,255,255,0.95);
      display: inline-block;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.5);
      font-size: 1.2rem;
      grid-column: 1 / -1;
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      .header {
        padding: 20px;
        margin-bottom: 20px;
      }

      .nav-breadcrumbs {
        font-size: 0.75rem;
        margin-bottom: 10px;
      }

      .title-section h1 {
        font-size: 1.6rem;
      }

      .layer-total-count {
        flex-direction: column;
        align-items: center;
        gap: 5px;
        margin-top: 8px;
      }

      .count-number {
        font-size: 2rem;
      }

      .count-label {
        font-size: 1rem;
      }

      .nav-buttons {
        width: 100%;
        flex-direction: column;
        gap: 10px;
      }

      .nav-btn {
        padding: 10px 15px;
        font-size: 0.85rem;
        width: 100%;
      }

      .groups-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .group-card {
        padding: 20px;
        min-height: 120px;
      }

      .group-title {
        font-size: 1.15rem;
        margin-bottom: 12px;
      }

      .teacher-name-in-title {
        padding: 2px 8px;
        font-size: 0.95rem;
      }

      .group-count-badge {
        font-size: 0.85rem;
        padding: 5px 12px;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .header {
        padding: 25px;
        margin-bottom: 25px;
      }

      .nav-breadcrumbs {
        font-size: 0.85rem;
        margin-bottom: 15px;
      }

      .title-section h1 {
        font-size: 2rem;
      }

      .layer-total-count {
        flex-direction: column;
        align-items: center;
        gap: 5px;
        margin-top: 10px;
      }

      .count-number {
        font-size: 2.2rem;
      }

      .count-label {
        font-size: 1.1rem;
      }

      .nav-buttons {
        width: 100%;
        justify-content: flex-start;
      }

      .nav-btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }

      .groups-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .group-card {
        padding: 22px;
      }

      .group-title {
        font-size: 1.25rem;
      }

      .header-content {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header" id="header">
      <div class="nav-breadcrumbs" id="breadcrumbs">
        <a href="index.html">בית</a> / <span id="layerName">שכבה</span>
      </div>
      <div class="header-content">
        <div class="title-section">
          <h1 id="layerTitle">שכבה</h1>
          <div class="layer-total-count" id="layerTotalCount">
            <span class="count-number" id="countNumber">0</span>
            <span class="count-label">תלמידים בשכבה</span>
          </div>
        </div>
        <div class="nav-buttons">
          <a href="index.html" class="nav-btn">🏠 בית</a>
          <a href="index.html" class="nav-btn">← חזרה</a>
        </div>
      </div>
    </div>

    <div class="groups-grid" id="groupsGrid">
      <div class="empty-state">טוען...</div>
    </div>
  </div>

  <script>
    const layer = window.SharedUtils ? window.SharedUtils.getURLParameter('layer') : new URLSearchParams(window.location.search).get('layer');

    function renderGroups() {
      if (!layer) {
        if (window.SharedUtils && window.SharedUtils.navigateToPage) {
          window.SharedUtils.navigateToPage('index.html');
        } else {
          window.location.href = 'index.html';
        }
        return;
      }
      
      if (!DataStore) {
        console.error('DataStore לא נטען');
        return;
      }

      const layerName = DataStore.getLayerName(layer) || layer;
      const layerTitleEl = document.getElementById('layerTitle');
      const layerNameEl = document.getElementById('layerName');
      const countNumberEl = document.getElementById('countNumber');
      
      if (layerTitleEl) layerTitleEl.textContent = `שכבת ${layerName}`;
      if (layerNameEl) layerNameEl.textContent = `שכבת ${layerName}`;

      const totalCount = DataStore.getLayerCount(layer) || 0;
      if (countNumberEl) countNumberEl.textContent = totalCount;

      const layerColor = DataStore.getLayerColor(layer);
      const headerEl = document.querySelector('.header');
      if (headerEl && layerColor) {
        headerEl.style.background = layerColor.replace('linear-gradient(145deg, ', 'linear-gradient(135deg, ').replace(')', ', rgba(0,0,0,0.3))');
      }

      // טעינת נתונים טריים
      DataStore.load(true);
      
      const groups = DataStore.getGroupsByLayer(layer);
      const grid = document.getElementById('groupsGrid');

      if (!grid) return;

      if (!groups || groups.length === 0) {
        grid.innerHTML = '<div class="empty-state">אין הקבצות בשכבה זו</div>';
        return;
      }

      // סינון קבוצות ריקות - רק קבוצות עם תלמידים או עם מורה
      const validGroups = groups.filter(group => {
        const count = DataStore.getGroupCount(group.id) || 0;
        const hasTeacher = group.teacherId && DataStore.getTeacher(group.teacherId);
        return count > 0 || hasTeacher;
      });

      if (validGroups.length === 0) {
        grid.innerHTML = '<div class="empty-state">אין הקבצות עם תלמידים בשכבה זו</div>';
        return;
      }

      const escapeHtml = window.SharedUtils ? window.SharedUtils.escapeHtml : (text) => {
        if (!text && text !== 0) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      };

      grid.innerHTML = validGroups.map((group) => {
        const teacher = group.teacherId ? DataStore.getTeacher(group.teacherId) : null;
        const count = DataStore.getGroupCount(group.id) || 0;
        
        // תיקון שם מורה שגוי - אם המורה הוא "איתי רז", נציג "יניב רז"
        let teacherName = teacher ? teacher.name : '';
        let teacherId = teacher ? teacher.id : '';
        
        // אם המורה הוא "איתי רז", נחפש את "יניב רז" במקום
        if (teacherName === 'איתי רז') {
          const yanivRaz = DataStore.teachers.find(t => t.name === 'יניב רז');
          if (yanivRaz) {
            teacherName = 'יניב רז';
            teacherId = yanivRaz.id;
          }
        }
        
        const groupNameEscaped = escapeHtml(group.name);
        const teacherNameEscaped = teacherName ? escapeHtml(teacherName) : '';
        const teacherIdEscaped = teacherId ? escapeHtml(teacherId) : '';
        const groupIdEscaped = escapeHtml(group.id);
        
        const groupTitle = teacherNameEscaped
          ? `הקבצה ${groupNameEscaped} - המורה <a href="teacher.html?teacherId=${teacherIdEscaped}" class="teacher-name-in-title" onclick="event.stopPropagation(); return false;">${teacherNameEscaped}</a>`
          : `הקבצה ${groupNameEscaped}`;

        return `
          <a href="group.html?groupId=${groupIdEscaped}" class="group-card">
            <div class="group-content">
              <div class="group-title">${groupTitle}</div>
              <div class="group-count-section">
                <div class="group-count-badge">${count} תלמידים</div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        DataStore.load();
        renderGroups();
        
        setInterval(() => {
          try {
            DataStore.load();
            renderGroups();
          } catch (e) {
            console.error('שגיאה בעדכון:', e);
          }
        }, 3000);
      } catch (e) {
        console.error('שגיאה בטעינת עמוד שכבה:', e);
        const grid = document.getElementById('groupsGrid');
        if (grid) {
          grid.innerHTML = '<div class="empty-state">שגיאה בטעינת הנתונים. אנא רענן את הדף.</div>';
        }
      }
    });
  </script>
</body>
</html>
