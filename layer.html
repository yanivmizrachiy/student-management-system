<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שכבת ט' – נורית מויאל</title>
  <script src="data.js"></script>
  <script src="shared-utils.js"></script>
  <script src="auto-load-data.js"></script>
  <style>
    :root {
      --bg: #070a16;
      --card: rgba(255, 255, 255, 0.04);
      --tag: rgba(255, 152, 0, 0.25);
      --subtle: rgba(255, 255, 255, 0.7);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 32px 18px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(99,102,241,0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .page {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }
    .nav-buttons {
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 20px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
      box-shadow: 0 5px 18px rgba(0,0,0,0.25);
    }
    .hero {
      background: linear-gradient(160deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }
    /* רקע ירוק כהה פרימיום לשכבת ח' */
    .hero.layer-8 {
      background: linear-gradient(145deg, #00695c 0%, #004d40 40%, #00251a 100%) !important;
      border: 2px solid rgba(0, 200, 83, 0.5) !important;
      box-shadow: 0 25px 60px rgba(0, 200, 83, 0.3), 
                  0 0 40px rgba(0, 200, 83, 0.15),
                  inset 0 0 60px rgba(0, 200, 83, 0.1) !important;
      position: relative;
      overflow: hidden;
    }
    .hero.layer-8::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0, 200, 83, 0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .hero.layer-8 > * {
      position: relative;
      z-index: 1;
    }
    .hero h1 {
      font-size: clamp(2.3rem, 3vw, 3rem);
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    /* כיתוב בהיר וקריא לשכבת ח' */
    .hero.layer-8 h1 {
      background: linear-gradient(135deg, #ffffff 0%, #a5f3fc 50%, #67e8f9 100%) !important;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent !important;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .hero p {
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 10px;
    }
    /* כיתוב בהיר וקריא לשכבת ח' */
    .hero.layer-8 p {
      color: rgba(255, 255, 255, 0.95) !important;
      font-weight: 600;
      font-size: 1.15rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
    .hero small {
      color: rgba(255, 255, 255, 0.55);
    }
    .hero.layer-8 small {
      color: rgba(255, 255, 255, 0.85) !important;
      font-weight: 500;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .group-card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 20px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 30px rgba(0,0,0,0.4);
    }
    .group-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .group-card:hover::after {
      opacity: 1;
    }
    .group-card strong {
      font-size: 1.35rem;
      letter-spacing: 0.4px;
    }
    .group-meta {
      font-size: 0.95rem;
      color: var(--subtle);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .group-meta span:first-child {
      color: #17bebb;
      font-weight: 600;
    }
    .group-count {
      margin-top: auto;
      font-size: 1.1rem;
      font-weight: 700;
      color: #facc15;
    }
    .empty-state {
      text-align: center;
      padding: 60px;
      color: rgba(255,255,255,0.65);
    }
    @media (max-width: 600px) {
      body {
        padding: 24px 12px;
      }
      .hero {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav-buttons">
      <a href="index.html" class="nav-btn">← חזרה לדף הבית</a>
    </div>
    <header class="hero">
      <h1 id="layerTitle">שכבה</h1>
      <p id="layerDescription">טוען...</p>
    </header>
    <section class="grid" id="groupsGrid">
      <div class="empty-state">טוען קבוצות...</div>
    </section>
  </div>
  <script>
    (function() {
      'use strict';
      const layerParam = SharedUtils.getURLParameter('layer');
      if (!layerParam) {
        document.body.innerHTML = '';
        return;
      }
      
      // הוספת class מיוחד לשכבת ח' (layer-8)
      const heroEl = document.querySelector('.hero');
      if (heroEl) {
        if (layerParam === '8') {
          heroEl.classList.add('layer-8');
        } else {
          heroEl.classList.remove('layer-8');
        }
      }
      
      let retryCount = 0;
      const MAX_RETRIES = 50; // מקסימום 10 שניות (50 * 200ms)
      
      function ensureData() {
        DataStore.load(true);
        if (DataStore._invalidateCache) {
          DataStore._invalidateCache();
        }
      }
      
      function waitForData(callback, maxWait = 10000) {
        const startTime = Date.now();
        const checkInterval = 200; // בדיקה כל 200ms
        
        const checkData = setInterval(() => {
          ensureData();
          
          // בדיקה אם יש תלמידים וקבוצות
          const hasData = Array.isArray(DataStore.students) && 
                         DataStore.students.length > 0 &&
                         Array.isArray(DataStore.groups) &&
                         DataStore.groups.length > 0;
          
          if (hasData || (window.__dataLoaded === true)) {
            clearInterval(checkData);
            callback();
          } else if (Date.now() - startTime > maxWait) {
            clearInterval(checkData);
            console.warn('⚠️ זמן המתנה לטעינת נתונים פג - ממשיכים בכל זאת');
            callback();
          }
        }, checkInterval);
      }
      
      function buildCard(group) {
        const teacher = DataStore.getTeacher(group.teacherId);
        const count = DataStore.getGroupCount(group.id, false);
        const card = document.createElement('article');
        card.className = 'group-card';
        
        card.innerHTML = `
          <strong>${SharedUtils.escapeHtml(group.name)}</strong>
          <div class="group-meta">
            <span>${teacher ? SharedUtils.escapeHtml(teacher.name) : 'מורה לא ידוע'}</span>
          </div>
          <div class="group-count">${count} תלמידים</div>
        `;
        return card;
      }
      
      function render() {
        ensureData();
        
        // הוספת class מיוחד לשכבת ח' (layer-8) ב-hero
        const heroEl = document.querySelector('.hero');
        if (heroEl) {
          if (layerParam === '8') {
            heroEl.classList.add('layer-8');
          } else {
            heroEl.classList.remove('layer-8');
          }
        }
        
        // בדיקה בסיסית
        if (!Array.isArray(DataStore.students) || DataStore.students.length === 0) {
          retryCount++;
          if (retryCount < MAX_RETRIES) {
            return setTimeout(render, 200);
          } else {
            console.error('❌ לא הצלחנו לטעון נתונים אחרי ' + MAX_RETRIES + ' ניסיונות');
            const grid = document.getElementById('groupsGrid');
            if (grid) {
              grid.innerHTML = '<div class="empty-state">שגיאה בטעינת נתונים. אנא רענן את הדף.</div>';
            }
            return;
          }
        }
        
        retryCount = 0; // איפוס מונה הניסיונות
        
        const groups = DataStore.getGroupsByLayer(layerParam);
        console.log(`📊 נמצאו ${groups.length} קבוצות בשכבה ${layerParam}`);
        
        // לוג כל הקבוצות
        groups.forEach(g => {
          const teacher = DataStore.getTeacher(g.teacherId);
          const count = DataStore.getGroupCount(g.id, false);
          console.log(`   - ${g.name} (${teacher ? teacher.name : 'ללא מורה'}): ${count} תלמידים`);
        });
        
        const grid = document.getElementById('groupsGrid');
        const filtered = groups.filter(group => {
          const count = DataStore.getGroupCount(group.id, false);
          return count > 0;
        });
        
        console.log(`✅ ${filtered.length} קבוצות עם תלמידים`);
        
        const layerName = DataStore.getLayerName(layerParam);
        const totalCount = DataStore.getLayerCount(layerParam, false);
        const titleEl = document.getElementById('layerTitle');
        const descEl = document.getElementById('layerDescription');
        
        if (titleEl) {
          titleEl.textContent = `שכבת ${layerName} - ${totalCount} לומדים`;
        }
        if (descEl) {
          descEl.textContent = `בשכבה זו ${filtered.length} קבוצות פעילות`;
        }
        
        if (!filtered.length) {
          grid.innerHTML = '<div class="empty-state">אין קבוצות זמינות כרגע, נסה לרענן.</div>';
          console.warn('⚠️ לא נמצאו קבוצות לשכבה', layerParam);
          return;
        }
        
        grid.innerHTML = '';
        filtered.forEach(group => {
          const card = buildCard(group);
          card.style.cursor = 'pointer';
          card.addEventListener('click', () => {
            window.location.href = `group.html?groupId=${encodeURIComponent(group.id)}`;
          });
          grid.appendChild(card);
        });
        
        // דיבוג - בדיקה ספציפית לנורית
        const nuritGroups = filtered.filter(g => {
          const teacher = DataStore.getTeacher(g.teacherId);
          return teacher && teacher.name === 'נורית מויאל';
        });
        if (nuritGroups.length > 0) {
          console.log(`✅ נורית מויאל מופיעה: ${nuritGroups.length} קבוצה/ות`);
          nuritGroups.forEach(g => {
            const count = DataStore.getGroupCount(g.id, false);
            console.log(`   ✅ ${g.name}: ${count} תלמידים`);
          });
        } else if (layerParam === '9') {
          console.warn('⚠️ נורית מויאל לא נמצאה בשכבה ט\' - בודקים את כל הקבוצות...');
          // בדיקה מפורטת יותר
          const allGroups = DataStore.getGroupsByLayer('9');
          const allTeachers = DataStore.teachers.filter(t => t.name === 'נורית מויאל');
          console.log(`   - סה"כ קבוצות בשכבה ט': ${allGroups.length}`);
          console.log(`   - מורים בשם נורית מויאל: ${allTeachers.length}`);
          if (allTeachers.length > 0) {
            allTeachers.forEach(t => {
              const teacherGroups = allGroups.filter(g => g.teacherId === t.id);
              console.log(`   - קבוצות של נורית (ID: ${t.id}): ${teacherGroups.length}`);
              teacherGroups.forEach(g => {
                const count = DataStore.getGroupCount(g.id, false);
                console.log(`     - ${g.name}: ${count} תלמידים`);
              });
            });
          }
        }
      }
      
      // המתן לנתונים לפני רינדור ראשוני
      waitForData(() => {
        render();
        // רענון כל 4 שניות
        setInterval(render, 4000);
      });
      
      // האזנה לאירוע dataLoaded
      window.addEventListener('dataLoaded', () => {
        console.log('📡 אירוע dataLoaded התקבל - מריץ render');
        render();
      });
    })();
  </script>
  <script src="live-reload.js"></script>
</body>
</html>
