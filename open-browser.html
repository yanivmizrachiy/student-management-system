<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פתיחת האתר בדפדפן</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .link-box {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      word-break: break-all;
    }
    .link-box a {
      color: #667eea;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .link-box a:hover {
      text-decoration: underline;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 30px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      margin: 10px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .info {
      margin-top: 30px;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 פתיחת האתר בדפדפן</h1>
    
    <div class="link-box">
      <a href="https://yanivmizrachiy.github.io/student-management-system/" target="_blank" id="mainLink">
        https://yanivmizrachiy.github.io/student-management-system/
      </a>
    </div>
    
    <a href="https://yanivmizrachiy.github.io/student-management-system/" target="_blank" class="btn">
      🚀 פתח את האתר
    </a>
    
    <div class="info">
      <p><strong>קישורים מהירים:</strong></p>
      <p>
        <a href="https://yanivmizrachiy.github.io/student-management-system/layer.html?layer=7" target="_blank" style="color: #2962ff;">שכבה ז'</a> | 
        <a href="https://yanivmizrachiy.github.io/student-management-system/layer.html?layer=8" target="_blank" style="color: #00c853;">שכבה ח'</a> | 
        <a href="https://yanivmizrachiy.github.io/student-management-system/layer.html?layer=9" target="_blank" style="color: #ff9800;">שכבה ט'</a>
      </p>
      <p style="margin-top: 20px; font-size: 0.8rem;">
        הקישור יציב ונשאר אותו דבר תמיד
      </p>
    </div>
  </div>
  
  <script>
    // פתיחה אוטומטית (אופציונלי - ניתן להסיר)
    // window.open('https://yanivmizrachiy.github.io/student-management-system/', '_blank');
  </script>
</body>
</html>
