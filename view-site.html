<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מערכת ניהול תלמידים - תצוגה</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: white;
      overflow: hidden;
    }
    .iframe-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }
    .loading h2 {
      margin-bottom: 20px;
      color: #667eea;
    }
    .spinner {
      border: 4px solid rgba(102, 126, 234, 0.3);
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      color: #ff6b6b;
      display: none;
    }
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <div class="loading" id="loading">
      <h2>🌐 טוען את האתר...</h2>
      <div class="spinner"></div>
      <p style="margin-top: 20px; color: #999;">
        https://yanivmizrachiy.github.io/student-management-system/
      </p>
    </div>
    
    <div class="error" id="error">
      <h2>❌ שגיאה בטעינת האתר</h2>
      <p>אנא בדוק את החיבור לאינטרנט</p>
      <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
        נסה שוב
      </button>
    </div>
    
    <iframe 
      id="siteFrame"
      src="https://yanivmizrachiy.github.io/student-management-system/"
      allow="fullscreen"
      onload="hideLoading()"
      onerror="showError()">
    </iframe>
  </div>
  
  <script>
    function hideLoading() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.display = 'none';
      }
    }
    
    function showError() {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      if (loading) loading.style.display = 'none';
      if (error) error.classList.add('show');
    }
    
    // בדיקה שהאתר נטען
    setTimeout(() => {
      const iframe = document.getElementById('siteFrame');
      try {
        if (iframe.contentWindow.location.href) {
          hideLoading();
        }
      } catch (e) {
        // Cross-origin - זה בסדר, האתר נטען
        hideLoading();
      }
    }, 3000);
  </script>
</body>
</html>
